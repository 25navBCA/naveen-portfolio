<!DOCTYPE html>
<html>
<head>
    <title>Naveen Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: #ffffff;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 42px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        p {
            color: #bbbbbb;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .card {
            background: #ffffff;
            color: #000000;
            padding: 35px;
            border-radius: 16px;
            width: 320px;
            margin: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .card h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus {
            border: 1px solid #000;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        button {
            padding: 12px 25px;
            border: none;
            background: #000000;
            color: #ffffff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #333333;
            transform: scale(1.05);
        }

        #success {
            margin-top: 15px;
            color: #2ecc71;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Naveen</h1>
        <p>BCA Student | Game Developer</p>

        <div class="card">
            <h2>Contact</h2>

            <form id="form">
                <input id="name" placeholder="Name" required><br>
                <input id="roll" placeholder="Fav Game" required><br>
                <input id="email" placeholder="Email" required><br>
                <button type="submit">Submit Here</button>
            </form>

            <div id="success">Successfully Submitted</div>
        </div>
    </div>

    <script>
        const backend = "https://naveen-portfolio-4.onrender.com";

        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();

            await fetch(`${backend}/submit`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    roll: document.getElementById("roll").value,
                    email: document.getElementById("email").value
                })
            });

            document.getElementById("success").style.display = "block";
            document.getElementById("form").reset();
        });
    </script>

</body>
</html>
